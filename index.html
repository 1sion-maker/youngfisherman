<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 아이폰 전화번호 자동 인식 방지 -->
<meta name="format-detection" content="telephone=no">

<title>청년어부 계좌이체</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",sans-serif;
}

body{
    background:#f4f6f8;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{
    width:100%;
    max-width:420px;
    background:#fff;
    border-radius:22px;
    padding:35px 25px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    text-align:center;
}

.logo{
    font-size:40px;
}

.title{
    margin-top:10px;
    font-size:30px;
    font-weight:700;
}

.sub{
    margin-top:8px;
    color:#666;
    font-size:18px;
}

.bank{
    margin-top:40px;
    color:#666;
    font-size:20px;
}

.account{
    margin-top:12px;
    font-size:34px;
    font-weight:700;
    letter-spacing:1px;
    color:#111;
}

.account a{
    color:#111 !important;
    text-decoration:none !important;
    pointer-events:none;
}

.name{
    margin-top:10px;
    color:#444;
    font-size:20px;
}

button{
    width:100%;
    margin-top:40px;
    border:none;
    background:#111827;
    color:#fff;
    border-radius:14px;
    padding:18px;
    font-size:20px;
    font-weight:700;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:translateY(-2px);
}

.notice{
    margin-top:20px;
    color:#888;
    line-height:1.6;
    font-size:15px;
}

.toast{
    position:fixed;
    left:50%;
    bottom:40px;
    transform:translateX(-50%);
    background:#111827;
    color:white;
    padding:14px 22px;
    border-radius:50px;
    opacity:0;
    transition:.3s;
    pointer-events:none;
    font-size:15px;
    white-space: nowrap;
}

.toast.show{
    opacity:1;
}
</style>

</head>

<body>

<div class="card">

<div class="logo">🐟</div>

<div class="title">청년어부</div>

<div class="sub">계좌이체 안내</div>

<div class="bank">하나은행</div>

<!-- 보이지 않는 문자로 전화번호 인식 방지 -->
<div class="account">
010&#8203;-3597&#8203;-7444&#8203;-307
</div>

<div class="name">박태영(청년어부)</div>

<button onclick="copyInfo()">
📋 계좌번호 복사
</button>

<div class="notice">
복사 버튼을 누르신 후<br>
사용 중인 은행 앱에 붙여넣기 해주세요.
</div>

</div>

<div id="toast" class="toast">
✅ 입금 정보가 복사되었습니다.
</div>

<script>

function copyInfo(){

const text=`하나은행
01035977444307`;

navigator.clipboard.writeText(text).then(()=>{

const toast=document.getElementById("toast");

toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},2000);

});

}

</script>

</body>
</html>
